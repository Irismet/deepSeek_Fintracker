{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-key"></i> Восстановление пароля</h4>
            </div>
            <div class="card-body">
                <p>Введите email, указанный при регистрации. Мы отправим инструкцию по восстановлению пароля.</p>
                <form method="POST" action="{{ url_for('forgot_password_page') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить инструкцию</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{{ url_for('login_page') }}">Вернуться ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

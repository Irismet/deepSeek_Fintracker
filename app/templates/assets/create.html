{% extends "base.html" %}

{% block title %}Добавить актив{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-plus-circle"></i> Добавить новый актив</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="ticker" class="form-label">Тикер <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="ticker" name="ticker" 
                               placeholder="Например: AAPL, BTC-USD, VOO" required>
                        <div class="form-text">Уникальный идентификатор актива на бирже</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="isin" class="form-label">ISIN код</label>
                        <input type="text" class="form-control" id="isin" name="isin" 
                               placeholder="Например: US0378331005 (Apple)" maxlength="12">
                        <div class="form-text">Международный идентификационный код ценной бумаги (12 символов)</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Название <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" 
                               placeholder="Например: Apple Inc." required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="asset_type" class="form-label">Тип актива <span class="text-danger">*</span></label>
                        <select class="form-select" id="asset_type" name="asset_type" required>
                            <option value="stock">Акция (Stock)</option>
                            <option value="etf">ETF</option>
                            <option value="bond">Облигация (Bond)</option>
                            <option value="crypto">Криптовалюта (Crypto)</option>
                            <option value="cash">Кэш (Cash)</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="currency" class="form-label">Валюта <span class="text-danger">*</span></label>
                        <select class="form-select" id="currency" name="currency" required>
                            <option value="USD">USD - Доллар США</option>
                            <option value="EUR">EUR - Евро</option>
                            <option value="RUB">RUB - Российский рубль</option>
                            <option value="GBP">GBP - Британский фунт</option>
                            <option value="BTC">BTC - Bitcoin</option>
                            <option value="ETH">ETH - Ethereum</option>
                        </select>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Создать
                        </button>
                        <a href="{{ url_for('assets_list') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

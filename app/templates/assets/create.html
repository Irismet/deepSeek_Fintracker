{% extends "base.html" %}

{% block title %}Добавить актив{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-plus-circle"></i> Добавить новый актив</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="ticker" class="form-label">Тикер <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="ticker" name="ticker" 
                               placeholder="Например: AAPL, BTC-USD, VOO" required>
                        <div class="form-text">Уникальный идентификатор актива на бирже</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="isin" class="form-label">ISIN код</label>
                        <input type="text" class="form-control" id="isin" name="isin" 
                               placeholder="Например: US0378331005 (Apple)" maxlength="12">
                        <div class="form-text">Международный идентификационный код ценной бумаги (12 символов)</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Название <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" 
                               placeholder="Например: Apple Inc." required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="asset_type" class="form-label">Тип актива <span class="text-danger">*</span></label>
                        <select class="form-select" id="asset_type" name="asset_type" required>
                            <option value="stock">Акция (Stock)</option>
                            <option value="etf">ETF</option>
                            <option value="bond">Облигация (Bond)</option>
                            <option value="crypto">Криптовалюта (Crypto)</option>
                            <option value="cash">Кэш (Cash)</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="currency" class="form-label">Валюта <span class="text-danger">*</span></label>
                        <select class="form-select" id="currency" name="currency" required>
                            <option value="KZT">KZT - Казахстанский тенге</option>
                            <option value="USD">USD - Доллар США</option>
                            <option value="EUR">EUR - Евро</option>
                            <option value="RUB">RUB - Российский рубль</option>
                            <option value="BTC">BTC - Bitcoin</option>
                            <option value="ETH">ETH - Ethereum</option>
                        </select>
                    </div>
                    <!-- После поля currency добавьте -->
                    <div class="mb-3" id="bondFields" style="display: none;">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="face_value" class="form-label">Номинал облигации</label>
                                <input type="number" step="any" class="form-control" id="face_value" name="face_value" 
                                    placeholder="Например: 1000">
                                <div class="form-text">Номинальная стоимость облигации</div>
                            </div>
                            <div class="col-md-6">
                                <label for="coupon_rate" class="form-label">Купонная ставка (%)</label>
                                <input type="number" step="any" class="form-control" id="coupon_rate" name="coupon_rate" 
                                    placeholder="Например: 5.5">
                                <div class="form-text">Годовая купонная ставка</div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="maturity_date" class="form-label">Дата погашения</label>
                            <input type="date" class="form-control" id="maturity_date" name="maturity_date">
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Создать
                        </button>
                        <a href="{{ url_for('assets_list') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Показываем/скрываем поля для облигаций при выборе типа
document.getElementById('asset_type').addEventListener('change', function() {
    const bondFields = document.getElementById('bondFields');
    if (this.value === 'bond') {
        bondFields.style.display = 'block';
    } else {
        bondFields.style.display = 'none';
    }
});
</script>
{% endblock %}

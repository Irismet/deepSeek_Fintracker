{% extends "base.html" %}

{% block title %}Добавить сделку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-exchange-alt"></i> Добавить транзакцию</h4>
            </div>
            <div class="card-body">
                <form id="transactionForm">
                    <input type="hidden" id="portfolio_id" name="portfolio_id" value="{{ portfolio_id }}">
                    
                    <div class="mb-3">
                        <label for="tx_type" class="form-label">Тип операции</label>
                        <select class="form-control" id="tx_type" name="tx_type" required onchange="toggleTaxSection()">
                            <option value="buy">Покупка</option>
                            <option value="sell">Продажа</option>
                            <option value="dividend">Дивиденды / Купон</option>
                            <option value="deposit">Пополнение</option>
                            <option value="withdraw">Вывод</option>
                            <option value="tax_fee">Налог/Комиссия</option>
                        </select>
                    </div>
                    
                    <div class="mb-3" id="asset_section">
                        <label for="asset_id" class="form-label">Актив</label>
                        <select class="form-control" id="asset_id" name="asset_id" onchange="onAssetChange()">
                            <option value="">Выберите актив (или оставьте пустым для кэша)</option>
                            {% for asset in assets %}
                            <option value="{{ asset.id }}" 
                                    data-ticker="{{ asset.ticker }}" 
                                    data-currency="{{ asset.currency }}" 
                                    data-exchange="{{ asset.exchange.name if asset.exchange else '' }}"
                                    data-isin="{{ asset.isin or '' }}">
                                {{ asset.ticker }} - {{ asset.name }} 
                                {% if asset.isin %}({{ asset.isin }}){% endif %}
                                {% if asset.exchange %} [{{ asset.exchange.name }}]{% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="quantity" class="form-label">Количество</label>
                                <input type="number" step="any" class="form-control" id="quantity" name="quantity" oninput="updateCalculations()" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="price" class="form-label">Цена за единицу</label>
                                <input type="number" step="any" class="form-control" id="price" name="price" oninput="updateCalculations()" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="broker_id" class="form-label">Брокер</label>
                                <select class="form-control" id="broker_id" name="broker_id">
                                    <option value="">Выберите брокера</option>
                                    {% for broker in brokers %}
                                    <option value="{{ broker.id }}">
                                        {{ broker.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="exchange" class="form-label">Биржа</label>
                                <select class="form-control" id="exchange" name="exchange">
                                    <option value="">Выберите биржу</option>
                                    {% for exchange in exchanges %}
                                    <option value="{{ exchange.name }}">{{ exchange.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="tx_currency" class="form-label">Валюта сделки</label>
                                <select class="form-control" id="tx_currency" name="tx_currency">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="RUB">RUB</option>
                                    <option value="KZT">KZT</option>
                                    <option value="BTC">BTC</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fee" class="form-label">Комиссия</label>
                                <input type="number" step="any" class="form-control" id="fee" name="fee" value="0">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="notes" class="form-label">Заметки</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="tx_date" class="form-label">Дата сделки</label>
                        <input type="datetime-local" class="form-control" id="tx_date" name="tx_date" required>
                    </div>
                    
                    <!-- Блок налогов (показывается только для дивидендов) -->
                    <div id="taxSection" style="display: none;">
                        <div class="card mb-3">
                            <div class="card-header bg-info text-white">
                                <h6 class="mb-0"><i class="fas fa-calculator"></i> Расчет налогов на дивиденды</h6>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="us_tax" class="form-label">Налог США (у источника)</label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" id="us_tax" readonly style="background-color: #e9ecef;">
                                                <span class="input-group-text">(15%)</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="local_tax" class="form-label">Местный налог</label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" id="local_tax" readonly style="background-color: #e9ecef;">
                                                <span class="input-group-text">(%)</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="alert alert-success">
                                    <strong>💸 Итого налогов:</strong>
                                    <span id="total_tax">0.00</span>
                                    <span id="tax_currency">USD</span>
                                </div>
                                <div class="alert alert-warning" id="taxFormula" style="font-size: 0.9em;">
                                    <i class="fas fa-info-circle"></i> 
                                    <span id="taxFormulaText">Выберите актив и заполните сумму</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{{ url_for('portfolios_detail_html', portfolio_id=portfolio_id) }}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Функция получения токена
function getAccessToken() {
    const match = document.cookie.match(/access_token=([^;]+)/);
    return match ? match[1] : null;
}

// Показать/скрыть блок налогов
function toggleTaxSection() {
    const txType = document.getElementById('tx_type').value;
    const taxSection = document.getElementById('taxSection');
    
    if (txType === 'dividend') {
        taxSection.style.display = 'block';
        updateCalculations();
    } else {
        taxSection.style.display = 'none';
    }
}

// При изменении актива
function onAssetChange() {
    const assetSelect = document.getElementById('asset_id');
    const selectedOption = assetSelect.options[assetSelect.selectedIndex];
    const currency = selectedOption.getAttribute('data-currency');
    const exchange = selectedOption.getAttribute('data-exchange');
    
    if (currency) {
        document.getElementById('tx_currency').value = currency;
    }
    if (exchange) {
        document.getElementById('exchange').value = exchange;
    }
    
    updateCalculations();
}

// Расчет налогов
function updateCalculations() {
    const txType = document.getElementById('tx_type').value;
    
    if (txType !== 'dividend') {
        return;
    }
    
    const assetSelect = document.getElementById('asset_id');
    const assetId = assetSelect.value;
    const quantity = parseFloat(document.getElementById('quantity').value);
    const price = parseFloat(document.getElementById('price').value);
    
    if (!assetId || isNaN(quantity) || isNaN(price) || quantity <= 0 || price <= 0) {
        document.getElementById('us_tax').value = '0.00';
        document.getElementById('local_tax').value = '0.00';
        document.getElementById('total_tax').innerHTML = '0.00';
        document.getElementById('taxFormulaText').innerHTML = 'Выберите актив и заполните сумму';
        return;
    }
    
    const grossAmount = quantity * price;
    const selectedOption = assetSelect.options[assetSelect.selectedIndex];
    const exchange = selectedOption.getAttribute('data-exchange') || '';
    const isin = selectedOption.getAttribute('data-isin') || '';
    
    let usTaxRate = 0;
    let localTaxRate = 0;
    let formulaText = '';
    
    // Определяем ставки налогов по правилам
    if (exchange === 'KASE' || exchange === 'AIX') {
        if (isin.startsWith('KZ')) {
            usTaxRate = 0;
            localTaxRate = 5;
            formulaText = `📌 Казахстанская бумага на ${exchange}: местный налог 5%`;
        } else {
            usTaxRate = 15;
            localTaxRate = 5;
            formulaText = `📌 Иностранная бумага на ${exchange}: налог США 15% + местный налог 5%`;
        }
    } else {
        if (isin.startsWith('US')) {
            usTaxRate = 15;
            localTaxRate = 10;
            formulaText = `📌 Американская бумага: налог США 15% + местный налог 10%`;
        } else {
            usTaxRate = 0;
            localTaxRate = 10;
            formulaText = `📌 Прочая бумага: местный налог 10%`;
        }
    }
    
    const usTax = grossAmount * usTaxRate / 100;
    const localTax = grossAmount * localTaxRate / 100;
    const totalTax = usTax + localTax;
    
    document.getElementById('us_tax').value = usTax.toFixed(4);
    document.getElementById('local_tax').value = localTax.toFixed(4);
    document.getElementById('total_tax').innerHTML = totalTax.toFixed(4);
    document.getElementById('tax_currency').innerHTML = selectedOption.getAttribute('data-currency') || 'USD';
    
    // Обновляем текст формулы
    document.getElementById('taxFormulaText').innerHTML = 
        `${formulaText}<br>
         Сумма дивидендов: ${grossAmount.toFixed(4)}<br>
         Налог США: ${usTax.toFixed(4)} (${usTaxRate}%)<br>
         Местный налог: ${localTax.toFixed(4)} (${localTaxRate}%)<br>
         <strong>Итого к уплате: ${totalTax.toFixed(4)}</strong>`;
}

// Установка даты
const now = new Date();
document.getElementById('tx_date').value = now.toISOString().slice(0, 16);

// Полностью переписываем функцию отправки формы
document.getElementById('transactionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    console.log('=== Submitting transaction ===');
    
    const token = getAccessToken();
    if (!token) {
        alert('Сессия истекла. Пожалуйста, войдите снова.');
        window.location.href = '/auth/login-page';
        return;
    }
    
    // Собираем данные формы
    const portfolioId = parseInt(document.getElementById('portfolio_id').value);
    const txType = document.getElementById('tx_type').value;
    const quantity = parseFloat(document.getElementById('quantity').value);
    const price = parseFloat(document.getElementById('price').value);
    const fee = parseFloat(document.getElementById('fee').value) || 0;
    const txCurrency = document.getElementById('tx_currency').value;
    const txDate = document.getElementById('tx_date').value;
    const brokerId = document.getElementById('broker_id').value ? parseInt(document.getElementById('broker_id').value) : null;
    const exchange = document.getElementById('exchange').value || null;
    const notes = document.getElementById('notes').value || null;
    
    const assetSelect = document.getElementById('asset_id');
    const assetId = assetSelect.value ? parseInt(assetSelect.value) : null;
    const assetTicker = assetId ? assetSelect.options[assetSelect.selectedIndex].getAttribute('data-ticker') : null;
    
    // Валидация
    if (!portfolioId || !txType || isNaN(quantity) || isNaN(price) || !txDate) {
        alert('Пожалуйста, заполните все обязательные поля');
        return;
    }
    
    // Формируем данные для отправки
    const formData = {
        portfolio_id: portfolioId,
        tx_type: txType,
        quantity: quantity,
        price: price,
        fee: fee,
        tx_currency: txCurrency,
        tx_date: new Date(txDate).toISOString(),
        broker_id: brokerId,
        exchange: exchange,
        notes: notes
    };
    
    if (assetId) {
        formData.asset_id = assetId;
        formData.asset_ticker = assetTicker;
    }
    
    // Добавляем налоговые данные для дивидендов
    if (txType === 'dividend') {
        const usTax = parseFloat(document.getElementById('us_tax').value) || 0;
        const localTax = parseFloat(document.getElementById('local_tax').value) || 0;
        formData.us_tax = usTax;
        formData.local_tax = localTax;
        
        // Расчет gross amount для налогов
        formData.gross_amount = quantity * price;
    }
    
    console.log('Sending data:', formData);
    
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';
    submitBtn.disabled = true;
    
    try {
        const response = await fetch('/api/transactions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(formData)
        });
        
        console.log('Response status:', response.status);
        
        if (response.status === 401) {
            alert('Сессия истекла. Пожалуйста, войдите снова.');
            window.location.href = '/auth/login-page';
            return;
        }
        
        if (response.ok) {
            const data = await response.json();
            console.log('Transaction created:', data);
            alert('✅ Транзакция успешно сохранена!');
            window.location.href = `/portfolios/${portfolioId}`;
        } else {
            const error = await response.json();
            console.error('Error response:', error);
            alert('❌ Ошибка: ' + (error.error || error.message || 'Неизвестная ошибка'));
        }
    } catch (error) {
        console.error('Fetch error:', error);
        alert('❌ Ошибка при сохранении: ' + error.message);
    } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    }
});



// Инициализация
document.addEventListener('DOMContentLoaded', function() {
    toggleTaxSection();
});
</script>
{% endblock %}
